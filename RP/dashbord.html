<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="h-screen bg-[url('./bg.jpg')] w-full bg-cover bg-center bg-no-repeat " style="font-family: 'joan';">
    <div class="flex h-full ">
        <div class="w-64 bg-[#2DC7FB] p-4 flex flex-col hidden md:flex h-full">
            <div class="flex justify-center  gap-3">
                <div class="rounded-full w-10 h-10 overflow-hidden border-2">
                    <img src="./logo.jpg" alt="Profil" class="w-full h-full object-cover">
                </div>
                <h1 class="font-bold text-xl text-center mb-10">Clinique <span class="text-white">221</span></h1>
            </div>
            <!-- Juste après la div du logo -->
            <hr class="border-t border-white/30 mx-4 my-2">
            <nav class="flex flex-col  gap-3 text-white px-4 ">
                <a href="./dashbord.html" class="flex items-center gap-4 hover:bg-white/50 p-2 rounded transition ">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
              <a href="./listesPrest.html" class="flex items-center gap-4 hover:bg-white/50 p-2 rounded transition">
                    <i class="fas fa-concierge-bell"></i>
                    <span>Prestations</span>
                </a>
            </nav>

            <a href="./connexion.html"
                class=" flex items-center w-full text-white px-4 py-2 flex mt-auto hover:bg-white/50 p-2 rounded transition items-center">
                <i class="fas fa-sign-out-alt mr-2"></i>
                Déconnexion
            </a>


        </div>
        <div class="flex justify-end m-2 md:hidden text-2xl">
            <i class="fas fa-bars"></i>
        </div>






        <div class="flex-1 flex flex-col gap-4 p-6 overflow-y-auto">
            <div class="hidden lg:flex items-center px-6 justify-between bg-white h-14 rounded-xl shadow-lg   ">
                <div class="relative 1/3">
                    <input type="text"
                        class="h-6 w-full pl-10 pr-4 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 "
                        placeholder="Rechercher...">
                    <i class="fas fa-search text-sm absolute left-3 top-1/2 -translate-y-1/2 "></i>
                </div>
                <div class="flex items-center gap-6 text-[#2DC7FB] ">
                    <i class="fas fa-moon cursor-pointer"></i>
                    <i class="fas fa-bell cursor-pointer"></i>
                    <div class="rounded-full w-9 h-9 overflow-hidden border-2 border-blue-100">
                        <img src="./femme.jpg" alt="Profil" class="w-full h-full object-cover">
                    </div>
                </div>

            </div>
            <div class=" bg-[#2DC7FB] flex justify-between p-4 rounded-lg items-center">
                <h1 class="font-bold text-xl text-white">Tableau de Bord</h1>
            </div>


            <div class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 p-5 rounded-lg ">
                <!-- prestation -->
                <div
                    class="bg-white rounded-xl shadow-md p-6 flex items-center justify-between border-t-4 border-red-500 hover:shadow-xl transition">
                    <div>
                        <p class="text-gray-500 text-sm font-semibold">Prestation</p>
                        <p class="text-2xl font-bold">50</p>
                    </div>
                    <div class="bg-red-500 w-12 h-12 flex items-center justify-center rounded-full text-white"><i
                            class="fas fa-calendar-check"></i></div>
                </div>

            </div>

            <div class="bg-white shadow-xl h-full rounded-xl p-6 mt-4">
                <h2 class="sm:text-lg lg:text-xl font-bold text-gray-800 mb-6">Répartition des prestations par Semaine
                </h2>
                <div class="overflow-x-auto">
                    <!-- overflow-x-auto  permet d'afficher automatiquement une barre de défilement horizontale uniquement si le contenu (images, tableaux, longs textes) dépasse la largeur de son conteneur -->
                        <table class="w-full border-collapse">
                            <thead>
                                <tr class="border-b-2 border-gray-100">
                                    <th
                                        class="py-4 px-6 text-left text-sm font-bold text-gray-400 uppercase tracking-wider">
                                        Créneau</th>
                                    <th class="py-4 px-2 text-center text-sm font-semibold text-gray-700">Lun</th>
                                    <th class="py-4 px-2 text-center text-sm font-semibold text-gray-700">Mar</th>
                                    <th class="py-4 px-2 text-center text-sm font-semibold text-gray-700">Mer</th>
                                    <th class="py-4 px-2 text-center text-sm font-semibold text-gray-700">Jeu</th>
                                    <th class="py-4 px-2 text-center text-sm font-semibold text-gray-700">Ven</th>
                                    <th class="py-4 px-2 text-center text-sm font-semibold text-gray-700">Sam</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
                                <!-- Ligne 08:00 -->
                                <tr class="hover:bg-slate-50 transition-colors group">
                                    <td class="py-5 px-6 font-bold text-[#2DC7FB]">08:00</td>
                                    <td class="text-center font-medium text-gray-600">3</td>
                                    <td class="text-center font-medium text-gray-600">5</td>
                                    <td class="text-center">
                                        <span
                                            class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-50 text-red-700 ring-1 ring-inset ring-red-600/20">Complet</span>
                                    </td>
                                    <td class="text-center font-medium text-gray-600">2</td>
                                    <td class="text-center font-medium text-gray-600">4</td>
                                    <td class="text-center font-medium text-gray-600">1</td>
                                </tr>
                                <!-- Ligne 10:00 -->
                                <tr class="hover:bg-slate-50 transition-colors">
                                    <td class="py-5 px-6 font-bold text-[#2DC7FB]">10:00</td>
                                    <td class="text-center font-medium text-gray-600">6</td>
                                    <td class="text-center">
                                        <span
                                            class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-700 ring-1 ring-inset ring-green-600/20">Libre</span>
                                    </td>
                                    <td class="text-center font-medium text-gray-600">4</td>
                                    <td class="text-center font-medium text-gray-600">8</td>
                                    <td class="text-center font-medium text-gray-600">3</td>
                                    <td class="text-center font-medium text-gray-600">0</td>
                                </tr>
                                <!-- Ligne 14:00 -->
                                <tr class="hover:bg-slate-50 transition-colors text-gray-600">
                                    <td class="py-5 px-6 font-bold text-[#2DC7FB]">14:00</td>
                                    <td class="text-center font-medium">2</td>
                                    <td class="text-center font-medium">4</td>
                                    <td class="text-center font-medium">2</td>
                                    <td class="text-center">
                                        <span
                                            class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-orange-50 text-orange-700 ring-1 ring-inset ring-orange-600/20">Urgence</span>
                                    </td>
                                    <td class="text-center font-medium">5</td>
                                    <td class="text-center text-gray-300">--</td>
                                </tr>
                            </tbody>
                        </table>

                </div>
            </div>
        </div>
    </div>
</body>

</html>
