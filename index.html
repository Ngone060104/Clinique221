<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Clinique 221</title>
    <!-- Chargement de Tailwind CSS via CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full">
        <!-- En-tête -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2">Bienvenue à la <span class="text-blue-600">Clinique 221</span></h1>
            <p class="text-slate-500">Sélectionnez votre espace de travail pour continuer</p>
        </div>

        <!-- Grille des espaces -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Espace Patient -->
            <a href="./patient/index.html" class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-blue-400 transition-all duration-300">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-2xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <i class="fas fa-user-injured"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-slate-800">Espace Patient</h3>
                        <p class="text-sm text-slate-500">Dossiers et rendez-vous</p>
                    </div>
                </div>
            </a>

            <!-- Espace Médecin -->
            <a href="./Medecin/index.html" class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-emerald-400 transition-all duration-300">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center text-2xl group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                        <i class="fas fa-user-md"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-slate-800">Espace Médecin</h3>
                        <p class="text-sm text-slate-500">Consultations et prescriptions</p>
                    </div>
                </div>
            </a>

            <!-- Espace RP -->
            <a href="./RP/index.html" class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-purple-400 transition-all duration-300">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center text-2xl group-hover:bg-purple-600 group-hover:text-white transition-colors">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-slate-800">Espace RP</h3>
                        <p class="text-sm text-slate-500">Relations et statistiques</p>
                    </div>
                </div>
            </a>

            <!-- Espace Secrétaire -->
            <a href="./Secrétaire/index.html" class="group bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-orange-400 transition-all duration-300">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center text-2xl group-hover:bg-orange-600 group-hover:text-white transition-colors">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-slate-800">Espace Secrétaire</h3>
                        <p class="text-sm text-slate-500">Accueil et facturation</p>
                    </div>
                </div>
            </a>

        </div>

        <div class="mt-12 text-center text-slate-400 text-sm">
            &copy; 2024 Clinique 221 - Tous droits réservés
        </div>
    </div>

</body>
</html>
