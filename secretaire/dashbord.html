<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="h-screen bg-[url('./bg.jpg')] w-full bg-cover bg-center bg-no-repeat " style="font-family: 'joan';">
    <div class="flex h-full ">
        <div class="w-64 bg-[#2DC7FB] p-4 flex flex-col hidden md:flex h-full">
            <div class="flex justify-center  gap-3">
                <div class="rounded-full w-10 h-10 overflow-hidden border-2">
                    <img src="./logo.jpg" alt="Profil" class="w-full h-full object-cover">
                </div>
                <h1 class="font-bold text-xl text-center mb-10">Clinique <span class="text-white">221</span></h1>
            </div>
            <!-- Juste après la div du logo -->
            <hr class="border-t border-white/30 mx-4 my-2">
            <nav class="flex flex-col  gap-3 text-white px-4 ">
                <a href="./dashbord.html" class="flex items-center gap-4 hover:bg-white/50 p-2 rounded transition ">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="./listes.html" class="flex items-center gap-4 hover:bg-white/50 p-2 rounded transition">
                    <i class="fas fa-calendar"></i>
                    <span>Agenda</span>
                </a>
            </nav>

            <a href="./index.html"
                class=" flex items-center w-full text-white px-4 py-2 flex mt-auto hover:bg-white/50 p-2 rounded transition items-center">
                <i class="fas fa-sign-out-alt mr-2"></i>
                Déconnexion
            </a>


        </div>
        <div class="flex justify-end m-2 md:hidden text-2xl">
            <i class="fas fa-bars"></i>
        </div>






        <div class="flex-1 flex flex-col gap-4 p-6 overflow-y-auto">
            <div class="hidden lg:flex items-center px-6 justify-between bg-white h-14 rounded-xl shadow-lg   ">
                <div class="relative 1/3">
                    <input type="text"
                        class="h-6 w-full pl-10 pr-4 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 "
                        placeholder="Rechercher...">
                    <i class="fas fa-search text-sm absolute left-3 top-1/2 -translate-y-1/2 "></i>
                </div>
                <div class="flex items-center gap-6 text-[#2DC7FB] ">
                    <i class="fas fa-moon cursor-pointer"></i>
                    <i class="fas fa-bell cursor-pointer"></i>
                    <div class="rounded-full w-9 h-9 overflow-hidden border-2 border-blue-100">
                        <img src="./femme.jpg" alt="Profil" class="w-full h-full object-cover">
                    </div>
                </div>

            </div>
            <div class=" bg-[#2DC7FB] flex justify-between p-4 rounded-lg items-center">
                <h1 class="font-bold text-xl text-white">Tableau de Bord</h1>
            </div>


            <div class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 p-5 rounded-lg ">
                <!-- prestation -->
                <div
                    class="bg-white rounded-xl shadow-md p-6 flex items-center justify-between border-t-4 border-red-500 hover:shadow-xl transition">
                    <div>
                        <p class="text-gray-500 text-sm font-semibold">Demandes</p>
                        <p class="text-2xl font-bold">50</p>
                    </div>
                    <div class="bg-red-500 w-12 h-12 flex items-center justify-center rounded-full text-white"><i
                            class="fas fa-calendar-check"></i></div>
                </div>

            </div>

            <div class="bg-white shadow-2xl rounded-2xl p-6 mt-4 border border-gray-100">
                <!-- Header avec Statistiques Rapides -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div>
                        <h2 class="text-xl font-black text-gray-800 uppercase tracking-tight">Flux Hebdomadaire</h2>
                        <p class="text-sm text-gray-400">Vue d'ensemble des demandes entrantes</p>
                    </div>
                    <!-- Badges de résumé pour le secrétaire -->
                    <div class="flex gap-3">
                        <div class="px-4 py-2 bg-blue-50 rounded-xl border border-blue-100 text-center">
                            <p class="text-[10px] font-bold text-blue-500 uppercase">Total</p>
                            <p class="text-lg font-black text-gray-700">42</p>
                        </div>
                        <div class="px-4 py-2 bg-orange-50 rounded-xl border border-orange-100 text-center">
                            <p class="text-[10px] font-bold text-orange-500 uppercase">Urgent</p>
                            <p class="text-lg font-black text-gray-700">01</p>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full border-separate border-spacing-y-2">
                        <thead>
                            <tr class="text-gray-400 text-[11px] font-black uppercase tracking-widest">
                                <th class="py-3 px-4 text-left">Créneau</th>
                                <th class="py-3 px-2 text-center">Lun</th>
                                <th class="py-3 px-2 text-center">Mar</th>
                                <th class="py-3 px-2 text-center">Mer</th>
                                <th class="py-3 px-2 text-center">Jeu</th>
                                <th class="py-3 px-2 text-center">Ven</th>
                                <th class="py-3 px-2 text-center">Sam</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Ligne 08:00 : Style "Intensité" -->
                            <tr class="bg-gray-50/50 hover:bg-white hover:shadow-md transition-all duration-300">
                                <td class="py-4 px-4 font-black text-gray-700 border-l-4 border-[#2DC7FB] rounded-l-xl">
                                    08:00</td>
                                <td class="text-center font-bold text-gray-600">3</td>
                                <td class="text-center font-bold text-gray-600 text-[#2DC7FB]">5</td>
                                <td class="text-center">
                                    <span
                                        class="bg-red-500 text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase">Saturé</span>
                                </td>
                                <td class="text-center font-bold text-gray-600">2</td>
                                <td class="text-center font-bold text-gray-600">4</td>
                                <td class="text-center font-bold text-gray-400 rounded-r-xl">1</td>
                            </tr>

                            <!-- Ligne 10:00 -->
                            <tr class="bg-gray-50/50 hover:bg-white hover:shadow-md transition-all duration-300">
                                <td class="py-4 px-4 font-black text-gray-700 border-l-4 border-green-400 rounded-l-xl">
                                    10:00</td>
                                <td class="text-center font-bold text-gray-600">6</td>
                                <td class="text-center italic text-green-500 font-bold text-xs">Disponible</td>
                                <td class="text-center font-bold text-gray-600">4</td>
                                <td class="text-center font-black text-gray-800">8</td>
                                <td class="text-center font-bold text-gray-600">3</td>
                                <td class="text-center font-bold text-gray-400 rounded-r-xl">0</td>
                            </tr>

                            <!-- Ligne 14:00 : Alerte Urgence -->
                            <tr class="bg-orange-50/30 hover:bg-white hover:shadow-md transition-all duration-300">
                                <td
                                    class="py-4 px-4 font-black text-gray-700 border-l-4 border-orange-400 rounded-l-xl">
                                    14:00</td>
                                <td class="text-center font-bold text-gray-600">2</td>
                                <td class="text-center font-bold text-gray-600">4</td>
                                <td class="text-center font-bold text-gray-600">2</td>
                                <td class="text-center">
                                    <span
                                        class="flex items-center justify-center gap-1 text-orange-600 font-black text-[10px] animate-pulse">
                                        <i class="fas fa-exclamation-triangle"></i> URGENCE
                                    </span>
                                </td>
                                <td class="text-center font-bold text-gray-600">5</td>
                                <td class="text-center font-bold text-gray-300 rounded-r-xl">--</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
