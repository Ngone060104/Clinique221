<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="h-screen bg-[url('./bg.jpg')] w-full bg-cover bg-center bg-no-repeat " style="font-family: 'joan';">
    <div class="flex h-full ">
        <div class="w-64 bg-[#2DC7FB] p-4 flex flex-col hidden md:flex h-full">
            <div class="flex justify-center  gap-3">
                <div class="rounded-full w-10 h-10 overflow-hidden border-2">
                    <img src="./logo.jpg" alt="Profil" class="w-full h-full object-cover">
                </div>
                <h1 class="font-bold text-xl text-center mb-10">Clinique <span class="text-white">221</span></h1>
            </div>
            <!-- Juste après la div du logo -->
            <hr class="border-t border-white/30 mx-4 my-2">
            <nav class="flex flex-col  gap-3 text-white px-4 ">
                <a href="./dashbord.html" class="flex items-center gap-4 hover:bg-white/50 p-2 rounded transition ">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="./listes.html" class="flex items-center gap-4 hover:bg-white/50 p-2 rounded transition">
                    <i class="fas fa-clipboard-check"></i>
                    <span>Prestations</span>
                </a>
            </nav>

            <a href="./connexion.html"
                class=" flex items-center w-full text-white px-4 py-2 flex mt-auto hover:bg-white/50 p-2 rounded transition items-center">
                <i class="fas fa-sign-out-alt mr-2"></i>
                Déconnexion
            </a>


        </div>
        <div class="flex justify-end m-2 md:hidden text-2xl">
            <i class="fas fa-bars"></i>
        </div>






        <div class="flex-1 flex flex-col gap-4 p-6 overflow-y-auto">
            <div class="hidden lg:flex items-center px-6 justify-between bg-white h-14 rounded-xl shadow-lg   ">
                <div class="relative 1/3">
                    <input type="text"
                        class="h-6 w-full pl-10 pr-4 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 "
                        placeholder="Rechercher...">
                    <i class="fas fa-search text-sm absolute left-3 top-1/2 -translate-y-1/2 "></i>
                </div>
                <div class="flex items-center gap-6 text-[#2DC7FB] ">
                    <i class="fas fa-moon cursor-pointer"></i>
                    <i class="fas fa-bell cursor-pointer"></i>
                    <div class="rounded-full w-9 h-9 overflow-hidden border-2 border-blue-100">
                        <img src="./femme.jpg" alt="Profil" class="w-full h-full object-cover">
                    </div>
                </div>

            </div>



            <div class="bg-white shadow-xl rounded-xl p-6 mt-4">
                <div class="flex-1 flex flex-col p-6 overflow-y-auto">
                    <!-- header -->
                    <div class="bg-[#2DC7FB] flex justify-between p-6 rounded-2xl items-center shadow-lg mb-6">
                        <div>
                            <h1 class="font-black sm:text-sm lg:text-2xl text-white uppercase">Agenda Hebdomadaire</h1>
                            <p class="text-blue-100 text-xs">Vérification des disponibilités pour validation</p>
                        </div>
                        <a href="./listes.html"
                            class="px-6 py-2 bg-white/20 hover:bg-white/40 text-white border border-white/30 rounded-full text-xs font-bold transition-all">
                            Retour à la liste
                        </a>
                    </div>

                    <!-- Barre de Filtres -->
                    <div
                        class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <div class="relative">
                            <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Sélection Médecin</label>
                            <select
                                class="w-full mt-1 p-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-[#2DC7FB] outline-none text-sm font-bold text-gray-700">
                                <option>Dr. Moussa Sy (Cardiologue)</option>
                                <option>Dr. Fatou Kane (Radiologue)</option>
                            </select>
                        </div>
                        <div class="relative">
                            <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Date de début</label>
                            <input type="date"
                                class="w-full mt-1 p-3 bg-gray-50 border border-gray-100 rounded-xl text-sm font-bold text-gray-700"
                                value="2025-02-12">
                        </div>
                        <div class="relative">
                            <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Date de fin</label>
                            <input type="date"
                                class="w-full mt-1 p-3 bg-gray-50 border border-gray-100 rounded-xl text-sm font-bold text-gray-700"
                                value="2025-02-19">
                        </div>
                    </div>

                    <!-- Le Tableau (Version moderne de tes Check/Croix) -->
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                        <div class="overflow-x-auto">
                            <table class="w-full border-collapse">
                                <thead>
                                    <tr class="bg-gray-50 border-b border-gray-100">
                                        <th class="py-5 px-6 text-left text-[11px] font-black text-gray-400 uppercase">
                                            Heure</th>
                                        <th
                                            class="py-5 px-2 text-center text-[11px] font-black text-gray-400 uppercase">
                                            Lundi</th>
                                        <th
                                            class="py-5 px-2 text-center text-[11px] font-black text-gray-400 uppercase">
                                            Mardi</th>
                                        <th
                                            class="py-5 px-2 text-center text-[11px] font-black text-gray-400 uppercase">
                                            Mercredi</th>
                                        <th
                                            class="py-5 px-2 text-center text-[11px] font-black text-gray-400 uppercase">
                                            Jeudi</th>
                                        <th
                                            class="py-5 px-2 text-center text-[11px] font-black text-gray-400 uppercase">
                                            Vendredi</th>
                                        <th
                                            class="py-5 px-2 text-center text-[11px] font-black text-gray-400 uppercase">
                                            Samedi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50">
                                    <!-- Ligne 08:00 -->
                                    <tr class="hover:bg-blue-50/30 transition-colors">
                                        <td class="py-4 px-6 font-black text-gray-700">08:00</td>
                                        <td class="p-2 text-center">
                                            <div
                                                class="w-8 h-8 mx-auto bg-red-100 text-red-500 rounded-lg flex items-center justify-center opacity-40">
                                                <i class="fas fa-times"></i></div>
                                        </td>
                                        <td class="p-2 text-center">
                                            <button
                                                class="w-8 h-8 mx-auto bg-green-100 text-green-600 rounded-lg flex items-center justify-center hover:bg-green-500 hover:text-white transition-all"><i
                                                    class="fas fa-check"></i></button>
                                        </td>
                                        <td class="p-2 text-center">
                                            <div
                                                class="w-8 h-8 mx-auto bg-red-100 text-red-500 rounded-lg flex items-center justify-center opacity-40">
                                                <i class="fas fa-times"></i></div>
                                        </td>
                                        <td class="p-2 text-center">
                                            <button
                                                class="w-8 h-8 mx-auto bg-green-100 text-green-600 rounded-lg flex items-center justify-center hover:bg-green-500 hover:text-white transition-all"><i
                                                    class="fas fa-check"></i></button>
                                        </td>
                                        <td class="p-2 text-center">
                                            <div
                                                class="w-8 h-8 mx-auto bg-red-100 text-red-500 rounded-lg flex items-center justify-center opacity-40">
                                                <i class="fas fa-times"></i></div>
                                        </td>
                                        <td class="p-2 text-center">
                                            <button
                                                class="w-8 h-8 mx-auto bg-green-100 text-green-600 rounded-lg flex items-center justify-center hover:bg-green-500 hover:text-white transition-all"><i
                                                    class="fas fa-check"></i></button>
                                        </td>
                                    </tr>
                                    <!-- Répéter pour les autres heures... -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>



            </div>

        </div>
</body>

</html>
