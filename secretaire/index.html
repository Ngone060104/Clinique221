<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="min-h-screen flex items-center justify-center p-5  bg-[#AAD4EC] "  style="font-family: 'joan';">
    <div class="bg-white h-full grid grid-cols-1 shadow-lg gap-7 p-8 rounded-xl 
            w-full max-w-3xl lg:grid-cols-2">
    
        <div class="p-5 flex flex-col justify-center ">
            <h1 class="font-bold text-2xl text-center">Connexion</h1>
            <p class="text-black text-xs sm:text-base text-center">Veuillez entrer vos informations de connexion</p>
            <div class="">
                <form action="" class="flex flex-col gap-4 "  id="form">
                    <label for="">Email</label>
                    <input type="email" class="h-7 px-3 py-1 w-full border border-gray-300 rounded-2xl p-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400" required
                        placeholder="votre email">
                    <label for="">Mot de Passe</label>
                    <input type="password" class="h-7 px-3 py-1 w-full border border-gray-300 rounded-2xl p-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400" required
                        placeholder="votre mot de passe">
                    <button class="w-full  bg-[#38B5DE] text-white rounded-2xl p-1  shadow-lg " type="submit"><a href="./dashbord.html">Se connecter</a></button>
                </form>
            </div>
        </div>
        <div class="relative w-full h-[70vh] md:h-full lg:h-[70vh] ">
            <img src="./secrataire11.jpg" alt="" class=" h-[100%] w-full object-cover rounded-xl">
        </div>

    </div>


</body>

</html>
